spring.application.name=paymentSystem

# Datasource
spring.datasource.url=jdbc:mysql://localhost:3306/wallet_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=truespring.datasource.username=root
spring.datasource.password=root

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# HikariCP (connection pool)
spring.datasource.hikari.maximum-pool-size=10

# MySQL driver settings
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate dialect (important for MySQL behavior)
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Better SQL logging (optional but useful)
spring.jpa.properties.hibernate.format_sql=true